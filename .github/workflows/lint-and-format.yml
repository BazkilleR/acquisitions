name: Lint and Format

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Run Prettier check
        id: format
        run: npm run format:check
        continue-on-error: true

      - name: Report lint failure
        if: steps.lint.outcome == 'failure'
        run: |
          echo "::error title=ESLint failed::Linting errors were found. Fix them locally by running: npm run lint:fix"

      - name: Report format failure
        if: steps.format.outcome == 'failure'
        run: |
          echo "::error title=Prettier failed::Formatting issues were found. Fix them locally by running: npm run format"

      - name: Fail if lint or format checks failed
        if: steps.lint.outcome == 'failure' || steps.format.outcome == 'failure'
        run: exit 1
